<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March 2026 — Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #17171a; --border: #2a2a2e;
    --text: #f0ede8; --muted: #6b6870;
    --coursera: #4ade80; --x: #f97316; --protein: #a78bfa;
    --miss: #ef4444; --empty: #1f1f23;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 16px 20px 12px; gap: 10px; overflow: hidden;
  }
  header { display: flex; align-items: baseline; gap: 16px; flex-shrink: 0; animation: fadeUp 0.5s ease both; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.02em; line-height: 1; }
  header h1 em { font-style: italic; color: var(--coursera); }
  .legend { display: flex; gap: 14px; flex-shrink: 0; animation: fadeUp 0.5s 0.05s ease both; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.07em; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-coursera { background: var(--coursera); }
  .dot-x        { background: var(--x); }
  .dot-protein  { background: var(--protein); }
  .dot-miss     { background: var(--miss); }
  .calendar-wrap { width: 100%; max-width: 720px; flex: 1; display: flex; flex-direction: column; min-height: 0; animation: fadeUp 0.5s 0.1s ease both; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .weekday-label { text-align: center; font-size: 0.58rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; padding: 2px 0; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; flex: 1; }
  .day-cell {
    background: var(--empty); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 5px 4px; cursor: pointer; transition: transform 0.12s, border-color 0.12s;
    display: flex; flex-direction: column; gap: 3px; position: relative; user-select: none; min-height: 0;
  }
  .day-cell:hover:not(.empty) { transform: translateY(-1px); border-color: var(--muted); }
  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .day-cell.today { border-color: var(--coursera); }
  .day-number { font-size: 0.62rem; font-weight: 500; color: var(--muted); line-height: 1; }
  .day-cell.today .day-number { color: var(--coursera); }
  .day-status { position: absolute; top: 3px; right: 4px; font-size: 0.5rem; line-height: 1; }
  .habits { display: flex; flex-direction: column; gap: 2px; flex: 1; justify-content: flex-end; }
  .habit-pill { height: 3px; border-radius: 99px; background: var(--border); transition: background 0.2s; }
  .habit-pill.done-coursera { background: var(--coursera); }
  .habit-pill.done-x        { background: var(--x); }
  .habit-pill.done-protein  { background: var(--protein); }
  .habit-pill.missed        { background: var(--miss); opacity: 0.6; }
  .stats { width: 100%; max-width: 720px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; flex-shrink: 0; animation: fadeUp 0.5s 0.15s ease both; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; display: flex; flex-direction: column; gap: 5px; }
  .stat-header { display: flex; align-items: center; gap: 6px; }
  .stat-icon { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .stat-name { font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .stat-bar-track { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .stat-numbers { display: flex; justify-content: space-between; align-items: baseline; }
  .stat-big { font-family: 'DM Serif Display', serif; font-size: 1.4rem; line-height: 1; }
  .stat-pct { font-size: 0.58rem; color: var(--muted); }
  .stat-card.coursera .stat-icon     { background: var(--coursera); }
  .stat-card.coursera .stat-bar-fill { background: var(--coursera); }
  .stat-card.coursera .stat-big      { color: var(--coursera); }
  .stat-card.xfree .stat-icon        { background: var(--x); }
  .stat-card.xfree .stat-bar-fill    { background: var(--x); }
  .stat-card.xfree .stat-big         { color: var(--x); }
  .stat-card.protein .stat-icon      { background: var(--protein); }
  .stat-card.protein .stat-bar-fill  { background: var(--protein); }
  .stat-card.protein .stat-big       { color: var(--protein); }
  .instructions { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.05em; text-align: center; flex-shrink: 0; animation: fadeUp 0.5s 0.2s ease both; }
  .instructions span { color: var(--text); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <h1>March <em>2026</em></h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-coursera"></div>Coursera ✓</div>
    <div class="legend-item"><div class="legend-dot dot-x"></div>No X ✓</div>
    <div class="legend-item"><div class="legend-dot dot-protein"></div>Protein ✓</div>
    <div class="legend-item"><div class="legend-dot dot-miss"></div>Missed</div>
  </div>
</header>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday-label">Sun</div>
    <div class="weekday-label">Mon</div>
    <div class="weekday-label">Tue</div>
    <div class="weekday-label">Wed</div>
    <div class="weekday-label">Thu</div>
    <div class="weekday-label">Fri</div>
    <div class="weekday-label">Sat</div>
  </div>
  <div class="calendar-grid" id="calendar"></div>
</div>

<div class="stats">
  <div class="stat-card coursera">
    <div class="stat-header"><div class="stat-icon"></div><div class="stat-name">Coursera 30min</div></div>
    <div class="stat-numbers">
      <div class="stat-big" id="coursera-count">0</div>
      <div class="stat-pct"><span id="coursera-pct">0%</span> done</div>
    </div>
    <div class="stat-bar-track"><div class="stat-bar-fill" id="coursera-bar" style="width:0%"></div></div>
  </div>
  <div class="stat-card xfree">
    <div class="stat-header"><div class="stat-icon"></div><div class="stat-name">No X Content</div></div>
    <div class="stat-numbers">
      <div class="stat-big" id="x-count">0</div>
      <div class="stat-pct"><span id="x-pct">0%</span> done</div>
    </div>
    <div class="stat-bar-track"><div class="stat-bar-fill" id="x-bar" style="width:0%"></div></div>
  </div>
  <div class="stat-card protein">
    <div class="stat-header"><div class="stat-icon"></div><div class="stat-name">+130g Protein</div></div>
    <div class="stat-numbers">
      <div class="stat-big" id="protein-count">0</div>
      <div class="stat-pct"><span id="protein-pct">0%</span> done</div>
    </div>
    <div class="stat-bar-track"><div class="stat-bar-fill" id="protein-bar" style="width:0%"></div></div>
  </div>
</div>

<p class="instructions">Click a day to cycle · <span>right-click to reset</span></p>

<script>
  const STORAGE_KEY = 'march2026_v3';
  let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const DAYS = 31, FIRST_DAY = 0, TODAY = 1;
  const HABITS = ['coursera', 'x', 'protein'];

  // Each click cycles one habit at a time (coursera → x → protein → back)
  // We track which habit to cycle next per day
  let cycleIndex = {};

  function cycleDay(day) {
    if (!state[day]) state[day] = { coursera: null, x: null, protein: null };
    if (cycleIndex[day] === undefined) cycleIndex[day] = 0;

    const h = HABITS[cycleIndex[day]];
    const cur = state[day][h];
    state[day][h] = cur === null ? 'done' : cur === 'done' ? 'miss' : null;

    // advance to next habit after full cycle (null→done→miss→null)
    if (state[day][h] === null) {
      cycleIndex[day] = (cycleIndex[day] + 1) % HABITS.length;
    }

    // if all null reset cycleIndex
    if (HABITS.every(h => state[day][h] === null)) {
      cycleIndex[day] = 0;
      state[day] = null;
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
  }

  function resetDay(day, e) {
    e.preventDefault();
    state[day] = null;
    cycleIndex[day] = 0;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
  }

  function render() {
    const grid = document.getElementById('calendar');
    grid.innerHTML = '';

    for (let i = 0; i < FIRST_DAY; i++) {
      const e = document.createElement('div');
      e.className = 'day-cell empty';
      grid.appendChild(e);
    }

    for (let day = 1; day <= DAYS; day++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (day === TODAY ? ' today' : '');
      cell.onclick = () => cycleDay(day);
      cell.oncontextmenu = (e) => resetDay(day, e);

      const num = document.createElement('div');
      num.className = 'day-number';
      num.textContent = day;
      cell.appendChild(num);

      const d = state[day] || { coursera: null, x: null, protein: null };
      const hasSome = HABITS.some(h => d[h]);

      if (hasSome) {
        const status = document.createElement('div');
        status.className = 'day-status';
        const allDone = HABITS.every(h => d[h] === 'done');
        const allMiss = HABITS.every(h => d[h] === 'miss');
        status.textContent = allDone ? '✅' : allMiss ? '❌' : '〜';
        cell.appendChild(status);
      }

      const habits = document.createElement('div');
      habits.className = 'habits';

      HABITS.forEach(h => {
        const p = document.createElement('div');
        p.className = 'habit-pill' + (d[h] === 'done' ? ` done-${h}` : d[h] === 'miss' ? ' missed' : '');
        habits.appendChild(p);
      });

      cell.appendChild(habits);
      grid.appendChild(cell);
    }

    updateStats();
  }

  function updateStats() {
    let counts = { coursera: 0, x: 0, protein: 0 };
    let tracked = 0;
    for (let day = 1; day <= DAYS; day++) {
      const d = state[day];
      if (d && HABITS.some(h => d[h])) {
        tracked++;
        HABITS.forEach(h => { if (d[h] === 'done') counts[h]++; });
      }
    }
    const base = tracked || 1;
    HABITS.forEach(h => {
      const pct = Math.round((counts[h] / base) * 100);
      document.getElementById(`${h}-count`).textContent = counts[h];
      document.getElementById(`${h}-pct`).textContent = pct + '%';
      document.getElementById(`${h}-bar`).style.width = pct + '%';
    });
  }

  render();
</script>
</body>
</html>
