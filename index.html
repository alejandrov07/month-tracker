<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>March 2026 — Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #17171a;
    --border: #2a2a2e;
    --text: #f0ede8;
    --muted: #6b6870;
    --coursera: #4ade80;
    --x: #f97316;
    --miss: #ef4444;
    --empty: #1f1f23;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 12px;
    gap: 12px;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    animation: fadeUp 0.5s ease both;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header h1 em {
    font-style: italic;
    color: var(--coursera);
  }

  .legend {
    display: flex;
    gap: 16px;
    animation: fadeUp 0.5s 0.05s ease both;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-coursera { background: var(--coursera); }
  .dot-x { background: var(--x); }
  .dot-miss { background: var(--miss); }

  .calendar-wrap {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.5s 0.1s ease both;
    min-height: 0;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }

  .weekday-label {
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 2px 0;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    flex: 1;
  }

  .day-cell {
    background: var(--empty);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 6px 5px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    user-select: none;
    min-height: 0;
  }

  .day-cell:hover:not(.empty) {
    transform: translateY(-1px);
    border-color: var(--muted);
  }

  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
    pointer-events: none;
  }

  .day-cell.today { border-color: var(--coursera); }

  .day-number {
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--muted);
    line-height: 1;
  }

  .day-cell.today .day-number { color: var(--coursera); }

  .day-status {
    position: absolute;
    top: 4px;
    right: 5px;
    font-size: 0.55rem;
    line-height: 1;
  }

  .habits {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
    justify-content: flex-end;
  }

  .habit-pill {
    height: 4px;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.2s;
  }

  .habit-pill.done-coursera { background: var(--coursera); }
  .habit-pill.done-x { background: var(--x); }
  .habit-pill.missed { background: var(--miss); opacity: 0.7; }

  .stats {
    width: 100%;
    max-width: 720px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    animation: fadeUp 0.5s 0.15s ease both;
    flex-shrink: 0;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-header {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .stat-icon {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat-name {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .stat-numbers {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .stat-big {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    line-height: 1;
  }

  .stat-pct {
    font-size: 0.62rem;
    color: var(--muted);
  }

  .stat-card.coursera .stat-icon { background: var(--coursera); }
  .stat-card.coursera .stat-bar-fill { background: var(--coursera); }
  .stat-card.coursera .stat-big { color: var(--coursera); }

  .stat-card.xfree .stat-icon { background: var(--x); }
  .stat-card.xfree .stat-bar-fill { background: var(--x); }
  .stat-card.xfree .stat-big { color: var(--x); }

  .instructions {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    flex-shrink: 0;
    animation: fadeUp 0.5s 0.2s ease both;
  }

  .instructions span { color: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <h1>March <em>2026</em></h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-coursera"></div>Coursera ✓</div>
    <div class="legend-item"><div class="legend-dot dot-x"></div>No X ✓</div>
    <div class="legend-item"><div class="legend-dot dot-miss"></div>Missed</div>
  </div>
</header>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday-label">Sun</div>
    <div class="weekday-label">Mon</div>
    <div class="weekday-label">Tue</div>
    <div class="weekday-label">Wed</div>
    <div class="weekday-label">Thu</div>
    <div class="weekday-label">Fri</div>
    <div class="weekday-label">Sat</div>
  </div>
  <div class="calendar-grid" id="calendar"></div>
</div>

<div class="stats">
  <div class="stat-card coursera">
    <div class="stat-header">
      <div class="stat-icon"></div>
      <div class="stat-name">Coursera 30min</div>
    </div>
    <div class="stat-numbers">
      <div class="stat-big" id="coursera-count">0</div>
      <div class="stat-pct"><span id="coursera-pct">0%</span> of tracked days</div>
    </div>
    <div class="stat-bar-track"><div class="stat-bar-fill" id="coursera-bar" style="width:0%"></div></div>
  </div>
  <div class="stat-card xfree">
    <div class="stat-header">
      <div class="stat-icon"></div>
      <div class="stat-name">No X Content</div>
    </div>
    <div class="stat-numbers">
      <div class="stat-big" id="x-count">0</div>
      <div class="stat-pct"><span id="x-pct">0%</span> of tracked days</div>
    </div>
    <div class="stat-bar-track"><div class="stat-bar-fill" id="x-bar" style="width:0%"></div></div>
  </div>
</div>

<p class="instructions">Click a day → <span>unset → ✅ both → ❌ Coursera → ❌ X → missed both → reset</span></p>

<script>
  const STORAGE_KEY = 'march2026_habits';
  let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

  const DAYS_IN_MARCH = 31;
  const FIRST_DAY = 0;
  const TODAY = 1;

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function cycleDay(day) {
    const d = state[day] || { coursera: null, x: null };
    if (!d.coursera && !d.x) {
      state[day] = { coursera: 'done', x: 'done' };
    } else if (d.coursera === 'done' && d.x === 'done') {
      state[day] = { coursera: 'miss', x: 'done' };
    } else if (d.coursera === 'miss' && d.x === 'done') {
      state[day] = { coursera: 'done', x: 'miss' };
    } else if (d.coursera === 'done' && d.x === 'miss') {
      state[day] = { coursera: 'miss', x: 'miss' };
    } else {
      state[day] = { coursera: null, x: null };
    }
    saveState();
    render();
  }

  function render() {
    const grid = document.getElementById('calendar');
    grid.innerHTML = '';

    for (let i = 0; i < FIRST_DAY; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= DAYS_IN_MARCH; day++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (day === TODAY ? ' today' : '');
      cell.onclick = () => cycleDay(day);

      const num = document.createElement('div');
      num.className = 'day-number';
      num.textContent = day;
      cell.appendChild(num);

      const d = state[day] || { coursera: null, x: null };

      if (d.coursera || d.x) {
        const status = document.createElement('div');
        status.className = 'day-status';
        if (d.coursera === 'done' && d.x === 'done') status.textContent = '✅';
        else if (d.coursera === 'miss' && d.x === 'miss') status.textContent = '❌';
        else status.textContent = '〜';
        cell.appendChild(status);
      }

      const habits = document.createElement('div');
      habits.className = 'habits';

      const p1 = document.createElement('div');
      p1.className = 'habit-pill' + (d.coursera === 'done' ? ' done-coursera' : d.coursera === 'miss' ? ' missed' : '');

      const p2 = document.createElement('div');
      p2.className = 'habit-pill' + (d.x === 'done' ? ' done-x' : d.x === 'miss' ? ' missed' : '');

      habits.appendChild(p1);
      habits.appendChild(p2);
      cell.appendChild(habits);
      grid.appendChild(cell);
    }

    updateStats();
  }

  function updateStats() {
    let cDone = 0, xDone = 0, tracked = 0;
    for (let day = 1; day <= DAYS_IN_MARCH; day++) {
      const d = state[day];
      if (d && (d.coursera || d.x)) {
        tracked++;
        if (d.coursera === 'done') cDone++;
        if (d.x === 'done') xDone++;
      }
    }
    const base = tracked || 1;
    const cPct = Math.round((cDone / base) * 100);
    const xPct = Math.round((xDone / base) * 100);

    document.getElementById('coursera-count').textContent = cDone;
    document.getElementById('x-count').textContent = xDone;
    document.getElementById('coursera-pct').textContent = cPct + '%';
    document.getElementById('x-pct').textContent = xPct + '%';
    document.getElementById('coursera-bar').style.width = cPct + '%';
    document.getElementById('x-bar').style.width = xPct + '%';
  }

  render();
</script>
</body>
</html>
